---
- name: Remédiation Sécurité globale pour Nginx
  hosts: all
  become: yes

 tasks:
    - name: "Désactiver la fuite de version Nginx (server_tokens) dans nginx.conf"
      ansible.builtin.lineinfile:
        path: /etc/nginx/nginx.conf
        # Cherche la ligne server_tokens (qu'elle soit commentée avec # ou non)
        regexp: '^\s*#?\s*server_tokens\s+.*'
        # La remplace par sa version désactivée
        line: '    server_tokens off;'
        insertafter: 'http \{'

    - name: "Créer un fichier de règles de sécurité (Headers) Nginx"
      ansible.builtin.blockinfile:
        path: /etc/nginx/conf.d/security.conf
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK - SECURITY HEADERS"
        block: |
          # X-Frame-Options pour éviter le Clickjacking
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          # ATTENTION : Ne pas mettre server_tokens ici pour éviter le doublon !

    - name: "Vérifier la syntaxe de la configuration Nginx"
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: "Recharger Nginx pour appliquer les patchs"
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
