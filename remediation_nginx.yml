---
- name: Remédiation Sécurité globale pour Nginx
  hosts: all
  become: yes

  tasks:
    - name: Désactiver server_tokens en remplaçant la ligne dans nginx.conf
      ansible.builtin.lineinfile:
        path: /etc/nginx/nginx.conf
        regexp: '^\s*server_tokens\s+.*'
        line: '    server_tokens off;'
        insertafter: 'http \{'
        state: present

    - name: Créer le fichier de headers de sécurité Nginx
      ansible.builtin.copy:
        dest: /etc/nginx/conf.d/security.conf
        content: |
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'self';" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header X-Content-Type-Options "nosniff" always;
        owner: root
        group: root
        mode: '0644'

    - name: Vérifier la syntaxe de la configuration Nginx
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Recharger Nginx pour appliquer les changements
      ansible.builtin.service:
        name: nginx
        state: reloaded
