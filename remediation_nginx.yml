---
- name: Remédiation Sécurité globale pour Nginx
  hosts: all
  become: yes

  tasks:
    - name: "Créer un fichier de règles de sécurité Nginx"
      ansible.builtin.blockinfile:
        path: /etc/nginx/conf.d/security.conf
        create: yes
        mode: '0644'
        marker: "# {mark} ANSIBLE MANAGED BLOCK - SOAR REMEDIATION NGINX"
        block: |
          # 1. Masquer la version exacte du serveur (Server Leaks Version Information)
          server_tokens off;
          
          # 2. Protection contre le Clickjacking (Missing Anti-Clickjacking Header)
          add_header X-Frame-Options "SAMEORIGIN" always;
          
          # 3. Politique de sécurité du contenu de base (Content-Security-Policy)
          add_header Content-Security-Policy "frame-ancestors 'self';" always;
          
          # 4. Protection basique contre le XSS
          add_header X-XSS-Protection "1; mode=block" always;
          
          # 5. Empêcher l'inférence du type MIME (Sniffing)
          add_header X-Content-Type-Options "nosniff" always;

    - name: "Vérifier la syntaxe de la configuration Nginx"
      ansible.builtin.command: nginx -t
      register: nginx_test
      changed_when: false

    - name: "Redémarrer Nginx pour appliquer les modifications"
      ansible.builtin.service:
        name: nginx
        state: restarted
      when: nginx_test.rc == 0
